name: "[Live] Node.js CI (Publish to JSR)"

defaults:
  run:
    working-directory: ./packages/live

on:
  push:
    paths:
      - "packages/live/**"
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Use PNPM Package Manager
        uses: pnpm/action-setup@v6
        with:
          version: 11
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx jsr publish --token $JSR_TOKEN
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
