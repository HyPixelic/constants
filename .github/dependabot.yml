version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/packages/live"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "@live"
  - package-ecosystem: "npm"
    directory: "/packages/static"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "@static"
  - package-ecosystem: "npm"
    directory: "/scripts"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    commit-message:
      prefix: "@scripts"
